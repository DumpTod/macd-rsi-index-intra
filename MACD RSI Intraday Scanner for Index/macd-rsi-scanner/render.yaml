services:
  # ── Backend: FastAPI Scanner ──────────────────────────────────────────────
  - type: web
    name: macd-rsi-scanner-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_SECRET_KEY
        sync: false
      - key: FYERS_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHONPATH
        value: backend
    healthCheckPath: /health
    autoDeploy: true
    plan: starter

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: web
    name: macd-rsi-scanner-frontend
    runtime: static
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
