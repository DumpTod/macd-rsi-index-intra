<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MACD+RSI Scanner — Trade History</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav">
  <a class="nav-brand" href="index.html">
    <span class="nav-pulse"></span>
    MACD<span>+</span>RSI <span style="color:var(--text-secondary);font-weight:400">Scanner</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Live Dashboard</a>
    <a class="nav-link active" href="history.html">Trade History</a>
    <a class="nav-link" href="backtest.html">Backtest Results</a>
    <a class="nav-link" href="settings.html">Settings</a>
  </div>
  <div class="nav-status">
    <span id="market-badge" class="market-badge closed">
      <span class="market-badge-dot"></span> —
    </span>
  </div>
</nav>

<div class="layout">

  <div class="page-header">
    <div>
      <div class="page-title">Trade History</div>
      <div class="page-subtitle">All live signals — graded A+, A, B+</div>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-outline" id="rescan-all-btn" onclick="rescanAll()">⟳ Rescan All Open</button>
      <button class="btn btn-primary" onclick="exportCSV()">↓ Export CSV</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select class="filter-select" id="filter-inst">
      <option value="">All Instruments</option>
      <option value="NIFTY">NIFTY</option>
      <option value="BANKNIFTY">BANKNIFTY</option>
      <option value="SENSEX">SENSEX</option>
    </select>
    <select class="filter-select" id="filter-grade">
      <option value="">All Grades</option>
      <option value="A+">A+</option>
      <option value="A">A</option>
      <option value="B+">B+</option>
    </select>
    <select class="filter-select" id="filter-status">
      <option value="">All Status</option>
      <option value="OPEN">Open</option>
      <option value="CLOSED">Closed</option>
      <option value="SL_HIT">SL Hit</option>
    </select>
    <input type="date" class="filter-input" id="filter-from" placeholder="From date" />
    <input type="date" class="filter-input" id="filter-to" placeholder="To date" />
    <button class="btn btn-outline" onclick="loadHistory()">⟳ Refresh</button>
    <span id="trade-count" style="font-family:var(--font-mono);font-size:0.75rem;color:var(--text-secondary);margin-left:4px"></span>
  </div>

  <div id="table-loading" style="display:none;text-align:center;padding:20px">
    <span class="spinner"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date & Time</th>
          <th>Instrument</th>
          <th>Grade</th>
          <th>Signal</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>Exit Type</th>
          <th>PnL (pts)</th>
          <th>PnL (₹)</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <tr>
          <td colspan="11">
            <div class="empty-state">
              <div class="empty-icon">📋</div>
              <div class="empty-text">Loading trades...</div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script src="js/supabase.js"></script>
<script src="js/history.js"></script>
</body>
</html>
